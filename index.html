<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لمسة شبابية - أناقتك تميزك</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9f9f9;
            color: #1e1e1e;
            line-height: 1.5;
        }
        :root {
            --black: #0a0a0a;
            --black-soft: #111111;
            --gold: #D4AF37;
            --gold-dark: #b88c2e;
            --gold-gradient: linear-gradient(135deg, #D4AF37, #F3E5AB);
            --gray-light: #f4f4f4;
            --white: #ffffff;
        }
        .navbar {
            background-color: var(--black);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 0.8rem;
            color: var(--gold);
            border-right: 1px solid var(--gold);
            padding-right: 12px;
            margin-right: 6px;
            font-weight: 500;
        }
        .nav-icons {
            display: flex;
            gap: 1.5rem;
        }
        .nav-icons i {
            color: var(--gold);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-icons i:hover { color: white; }
        .hero {
            background: linear-gradient(97deg, #0a0a0a 30%, #1a1a1a 100%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--gold);
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--white);
        }
        .hero h1 span {
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            color: #ccc;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 0;
            width: 60px;
            height: 3px;
            background: var(--gold);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .product-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #eee;
        }
        .product-info {
            padding: 1.2rem;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .product-price {
            color: var(--gold-dark);
            font-weight: 800;
            font-size: 1.3rem;
            margin: 0.5rem 0;
        }
        .btn-gold {
            background: var(--gold);
            border: none;
            color: var(--black);
            padding: 0.7rem 1rem;
            width: 100%;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-gold:hover {
            background: var(--gold-dark);
            color: white;
            transform: scale(0.98);
        }
        .badge-star {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #faf3e0;
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: var(--gold-dark);
        }
        footer {
            background-color: var(--black);
            color: #aaa;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid var(--gold);
        }
        footer .footer-logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 12px; text-align: center; }
            .hero h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
            .products-grid { gap: 1.2rem; }
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }
        .logo-icon i { font-size: 1.3rem; color: var(--gold); }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--gold);
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-bottom: 1rem;
            color: var(--gold);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            color: white;
        }
        .modal-content .btn-gold { margin-top: 1rem; }
        .close-modal {
            float: left;
            font-size: 24px;
            cursor: pointer;
            color: var(--gold);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .cart-item-details { flex: 2; }
        .cart-item-actions button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            margin: 0 5px;
        }
        .cart-total {
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: left;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--gold);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
            z-index: 3000;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .profile-order {
            background: #2a2a2a;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-hanger"></i></div>
        <div class="logo">لَمْسَة شَبَابِيَّة</div>
        <div class="tagline">أناقتك... تميزك</div>
    </div>
    <div class="nav-icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-user" id="profileIcon"></i>
        <i class="fas fa-shopping-bag" id="cartIcon"></i>
    </div>
</div>

<div class="hero">
    <h1>أطلَق <span>أناقتَك</span> <br> مع لمسة شبابية</h1>
    <p>أزياء راقية تعكس تميزك، تشكيلة حصرية لكل الأذواق</p>
</div>

<div class="container">
    <h2 class="section-title">أحدث الإطلالات</h2>
    <div class="products-grid" id="productsGrid"></div>
</div>

<footer>
    <div class="footer-logo">لَمْسَة شَبَابِيَّة</div>
    <p>© 2025 جميع الحقوق محفوظة | أناقتك سر تميزك</p>
    <div>
        <i class="fab fa-instagram" style="color: var(--gold); margin: 0 6px;"></i>
        <i class="fab fa-twitter" style="color: var(--gold); margin: 0 6px;"></i>
        <i class="fab fa-snapchat" style="color: var(--gold); margin: 0 6px;"></i>
    </div>
</footer>

<!-- Modal السلة -->
<div class="modal" id="cartModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeCartModal()">&times;</span>
        <h3><i class="fas fa-shopping-bag"></i> سلة التسوق</h3>
        <div id="cartItemsList"></div>
        <div class="cart-total" id="cartTotal"></div>
        <button class="btn-gold" id="checkoutBtn">إتمام الطلب</button>
    </div>
</div>

<!-- Modal الملف الشخصي (طلب رقم الهاتف) -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeProfileModal()">&times;</span>
        <h3><i class="fas fa-user"></i> ملفي الشخصي</h3>
        <input type="tel" id="profilePhone" placeholder="أدخل رقم هاتفك لعرض طلباتك" required>
        <button class="btn-gold" id="showOrdersBtn">عرض طلباتي</button>
        <div id="profileOrdersList" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Modal إتمام الطلب (بيانات العميل) -->
<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeCheckoutModal()">&times;</span>
        <h3>إتمام الطلب</h3>
        <input type="text" id="checkoutName" placeholder="الاسم الكامل" required>
        <input type="tel" id="checkoutPhone" placeholder="رقم الهاتف" required>
        <textarea id="checkoutAddress" rows="3" placeholder="العنوان بالتفصيل"></textarea>
        <button class="btn-gold" id="finalizeOrderBtn">تأكيد الطلب</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // === بيانات المنتجات من localStorage ===
    let products = JSON.parse(localStorage.getItem('lamsa_products')) || [
        { id: 1, name: 'بليزر كلاسيك ذهبي', price: 340, oldPrice: 0, category: 'men', desc: 'بليزر بقصة عصرية', icon: 'fas fa-tshirt', badge: 'إصدار محدود', image: 'https://placehold.co/600x800/111111/D4AF37?text=Blazer' },
        { id: 2, name: 'قميص كاجوال أسود', price: 180, oldPrice: 250, category: 'men', desc: 'قميص قطني مريح', icon: 'fas fa-tshirt', badge: 'الأكثر مبيعاً', image: 'https://placehold.co/600x800/111111/D4AF37?text=Shirt' },
        { id: 3, name: 'ساعة أنيقة ذهبية', price: 550, oldPrice: 0, category: 'watches', desc: 'ساعة كرونوغراف', icon: 'fas fa-clock', badge: 'تميز', image: 'https://placehold.co/600x800/111111/D4AF37?text=Watch' },
        { id: 4, name: 'حذاء جلد فاخر', price: 420, oldPrice: 600, category: 'shoes', desc: 'حذاء رسمي', icon: 'fas fa-shoe-prints', badge: 'جودة عالية', image: 'https://placehold.co/600x800/111111/D4AF37?text=Shoes' },
        { id: 5, name: 'حقيبة يد أنيقة', price: 290, oldPrice: 0, category: 'women', desc: 'حقيبة جلدية', icon: 'fas fa-bag-shopping', badge: '', image: 'https://placehold.co/600x800/111111/D4AF37?text=Bag' }
    ];
    let orders = JSON.parse(localStorage.getItem('lamsa_orders')) || [];
    let cart = JSON.parse(localStorage.getItem('lamsa_cart')) || [];

    if (!localStorage.getItem('lamsa_products')) {
        localStorage.setItem('lamsa_products', JSON.stringify(products));
    }

    // === إعدادات التليجرام (مأخوذة من localStorage أو افتراضية) ===
    let telegramToken = localStorage.getItem('telegram_token') || '7963817662:AAEzdlPpa78KtKOtEtYYQZ8s8eZwu8toH-I';
    let telegramChatId = localStorage.getItem('telegram_chat_id') || '8496525619';

    // === دوال مساعدة ===
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = type === 'success' ? 'var(--gold)' : '#f44336';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function saveCart() {
        localStorage.setItem('lamsa_cart', JSON.stringify(cart));
    }

    // إرسال رسالة إلى التليجرام
    async function sendTelegramMessage(message) {
        const url = `https://api.telegram.org/bot${telegramToken}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: telegramChatId, text: message, parse_mode: 'HTML' })
            });
            const data = await response.json();
            if (!data.ok) console.error('Telegram error:', data);
        } catch (error) {
            console.error('Failed to send Telegram message:', error);
        }
    }

    // عرض المنتجات في الصفحة الرئيسية
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img class="product-img" src="${product.image || 'https://placehold.co/600x800/111111/D4AF37?text=No+Img'}" alt="${product.name}">
                <div class="product-info">
                    ${product.badge ? `<div class="badge-star"><i class="fas fa-star"></i> ${product.badge}</div>` : ''}
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.price} ج.س ${product.oldPrice ? `<del>${product.oldPrice} ج.س</del>` : ''}</div>
                    <button class="btn-gold add-to-cart" data-id="${product.id}">
                        <i class="fas fa-shopping-cart"></i> أضف إلى السلة
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                addToCart(id);
            });
        });
    }

    // إضافة منتج إلى السلة
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveCart();
        showToast(`تم إضافة ${product.name} إلى السلة`, 'success');
        updateCartIconCount();
    }

    // تحديث أيقونة السلة بعدد المنتجات
    function updateCartIconCount() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartIcon = document.getElementById('cartIcon');
        if (totalItems > 0) {
            cartIcon.setAttribute('data-count', totalItems);
            // يمكن إضافة عداد على الأيقونة، لكن نكتفي بتغيير اللون أو إظهار رسالة
        } else {
            cartIcon.removeAttribute('data-count');
        }
    }

    // عرض السلة في المودال
    function renderCartModal() {
        const container = document.getElementById('cartItemsList');
        const totalContainer = document.getElementById('cartTotal');
        if (cart.length === 0) {
            container.innerHTML = '<p>سلة التسوق فارغة</p>';
            totalContainer.innerHTML = '';
            return;
        }
        let html = '';
        let total = 0;
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-details">
                        <strong>${item.name}</strong><br>
                        ${item.price} ج.س × ${item.quantity} = ${itemTotal} ج.س
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="updateQuantity(${idx}, -1)"><i class="fas fa-minus"></i></button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity(${idx}, 1)"><i class="fas fa-plus"></i></button>
                        <button onclick="removeCartItem(${idx})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalContainer.innerHTML = `<strong>الإجمالي: ${total} ج.س</strong>`;
    }

    window.updateQuantity = function(index, delta) {
        if (cart[index]) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            saveCart();
            renderCartModal();
            updateCartIconCount();
            if (cart.length === 0) closeCartModal();
        }
    };
    window.removeCartItem = function(index) {
        cart.splice(index, 1);
        saveCart();
        renderCartModal();
        updateCartIconCount();
        if (cart.length === 0) closeCartModal();
    };

    function openCartModal() {
        renderCartModal();
        document.getElementById('cartModal').classList.add('active');
    }
    function closeCartModal() {
        document.getElementById('cartModal').classList.remove('active');
    }

    // عملية إتمام الطلب
    function openCheckoutModal() {
        if (cart.length === 0) {
            showToast('السلة فارغة، أضف منتجات أولاً', 'error');
            return;
        }
        document.getElementById('checkoutModal').classList.add('active');
    }

    function closeCheckoutModal() {
        document.getElementById('checkoutModal').classList.remove('active');
        document.getElementById('checkoutName').value = '';
        document.getElementById('checkoutPhone').value = '';
        document.getElementById('checkoutAddress').value = '';
    }

    async function finalizeOrder() {
        const name = document.getElementById('checkoutName').value.trim();
        const phone = document.getElementById('checkoutPhone').value.trim();
        const address = document.getElementById('checkoutAddress').value.trim();
        if (!name || !phone) {
            showToast('الرجاء إدخال الاسم ورقم الهاتف', 'error');
            return;
        }
        if (cart.length === 0) {
            showToast('السلة فارغة', 'error');
            return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const orderDetails = cart.map(item => `${item.name} × ${item.quantity} = ${item.price * item.quantity} ج.س`).join('\n');
        const order = {
            id: Date.now(),
            name,
            phone,
            address,
            total,
            items: cart.map(item => ({ id: item.id, name: item.name, price: item.price, quantity: item.quantity })),
            date: new Date().toISOString()
        };
        orders.push(order);
        localStorage.setItem('lamsa_orders', JSON.stringify(orders));

        // إرسال إشعار التليجرام
        const message = `🛍️ <b>طلب جديد من متجر لمسة شبابية</b>\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n🏠 العنوان: ${address}\n📦 المنتجات:\n${orderDetails}\n💰 الإجمالي: ${total} ج.س\n🕒 التاريخ: ${new Date().toLocaleString('ar-EG')}`;
        await sendTelegramMessage(message);

        // مسح السلة
        cart = [];
        saveCart();
        updateCartIconCount();
        closeCheckoutModal();
        closeCartModal();
        showToast('تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً', 'success');
    }

    // الملف الشخصي: عرض الطلبات حسب رقم الهاتف
    function openProfileModal() {
        document.getElementById('profileModal').classList.add('active');
        document.getElementById('profileOrdersList').innerHTML = '';
    }
    function closeProfileModal() {
        document.getElementById('profileModal').classList.remove('active');
    }
    function showUserOrders() {
        const phone = document.getElementById('profilePhone').value.trim();
        if (!phone) {
            showToast('الرجاء إدخال رقم الهاتف', 'error');
            return;
        }
        const userOrders = orders.filter(order => order.phone === phone);
        const container = document.getElementById('profileOrdersList');
        if (userOrders.length === 0) {
            container.innerHTML = '<p>لا توجد طلبات سابقة لهذا الرقم</p>';
            return;
        }
        let html = '<h4>طلباتي السابقة</h4>';
        userOrders.forEach(order => {
            html += `<div class="profile-order">
                        <strong>التاريخ:</strong> ${new Date(order.date).toLocaleString('ar-EG')}<br>
                        <strong>الإجمالي:</strong> ${order.total} ج.س<br>
                        <strong>العنوان:</strong> ${order.address}<br>
                        <strong>المنتجات:</strong><br>${order.items.map(item => `${item.name} × ${item.quantity}`).join('<br>')}
                     </div>`;
        });
        container.innerHTML = html;
    }

    // أحداث
    document.getElementById('cartIcon').addEventListener('click', openCartModal);
    document.getElementById('profileIcon').addEventListener('click', openProfileModal);
    document.getElementById('checkoutBtn').addEventListener('click', openCheckoutModal);
    document.getElementById('finalizeOrderBtn').addEventListener('click', finalizeOrder);
    document.getElementById('showOrdersBtn').addEventListener('click', showUserOrders);

    // إغلاق المودالات بالنقر خارج المحتوى
    window.onclick = function(event) {
        const cartModal = document.getElementById('cartModal');
        const profileModal = document.getElementById('profileModal');
        const checkoutModal = document.getElementById('checkoutModal');
        if (event.target === cartModal) closeCartModal();
        if (event.target === profileModal) closeProfileModal();
        if (event.target === checkoutModal) closeCheckoutModal();
    };

    // تهيئة الصفحة
    renderProducts();
    updateCartIconCount();
</script>
</body>
    </html>
