<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ترند الأناقة | متجرك للأزياء العصرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #1A1A1A;
            --gray-light: #F5F5F5;
            --accent: #B8860B;
        }
        * { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .trend-gradient { background: linear-gradient(90deg, var(--black), var(--accent)); }
        .cart-sidebar {
            position: fixed; top: 0; left: 0; width: 100%; max-width: 380px; height: 100%;
            background: white; z-index: 1100; transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .cart-sidebar.open { transform: translateX(0); }
        .overlay-dark { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 1050; display: none; }
        .overlay-dark.show { display: block; }
        .toast {
            position: fixed; bottom: 20px; left: 20px; background: #323232; color: white;
            padding: 12px 24px; border-radius: 40px; z-index: 2000; opacity: 0;
            transition: 0.2s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        input, select, button { outline: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                <i class="fa-solid fa-shirt text-2xl" style="color: var(--black);"></i>
                <h1 class="text-2xl font-black" style="color: var(--black);">ترند الأناقة</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-bag-shopping text-xl" style="color: var(--black);"></i>
                    <span id="cartBadge" class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </div>
                <div class="cursor-pointer" onclick="logout()">
                    <i class="fa-solid fa-sign-out-alt text-gray-500"></i>
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="max-w-7xl mx-auto px-4 py-8"></main>

    <div id="cartSidebar" class="cart-sidebar flex flex-col">
        <div class="p-5 border-b flex justify-between items-center">
            <h2 class="text-xl font-black" style="color: var(--black);">سلة التسوق</h2>
            <i class="fa-solid fa-xmark text-2xl cursor-pointer hover:text-red-500" onclick="toggleCart()"></i>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-5 border-t bg-gray-50">
            <div class="flex justify-between items-center font-bold text-lg mb-4">
                <span>الإجمالي</span>
                <span id="cartTotalAmount" class="text-black">0 ج.س</span>
            </div>
            <button onclick="checkout()" class="w-full trend-gradient text-white py-3 rounded-xl font-bold transition hover:scale-[0.98]">إتمام الطلب عبر واتساب</button>
        </div>
    </div>
    <div id="overlay" class="overlay-dark" onclick="toggleCart()"></div>

    <div id="toast" class="toast"></div>

    <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[1200]">
        <div class="bg-white rounded-2xl p-6 w-11/12 max-w-md text-center">
            <i class="fa-solid fa-user-tie text-5xl mb-3" style="color: var(--black);"></i>
            <h2 class="text-2xl font-black mb-4" style="color: var(--black);">مرحباً بك</h2>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" class="w-full border border-gray-200 rounded-xl p-3 mb-3 text-right">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full border border-gray-200 rounded-xl p-3 mb-4 text-right">
            <button onclick="handleLogin()" class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-gray-800 transition">دخول</button>
     
     
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const WHATSAPP_NUMBER = '249115169965';

        // ---------- GLOBAL STATE ----------
        let currentUser = null;   
        let products = [];
        let cart = [];
        let orders = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#e53e3e' : '#1A1A1A';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ---------- DATA PERSISTENCE ----------
        function loadData() {
            const storedProducts = localStorage.getItem('products_trend');
            if (storedProducts) products = JSON.parse(storedProducts);
            else {
                products = [
                    { id: 1, name: 'قميص أبيض كلاسيك', price: 15000, category: 'ملابس', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400' },
                    { id: 2, name: 'بنطال جينز أزرق', price: 22000, category: 'ملابس', image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400' },
                    { id: 3, name: 'حذاء رياضي نايس', price: 35000, category: 'أحذية', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
                    { id: 4, name: 'ساعة يد فاخرة', price: 45000, category: 'إكسسوارات', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400' }
                ];
                localStorage.setItem('products_trend', JSON.stringify(products));
            }
            const storedOrders = localStorage.getItem('orders_trend');
            orders = storedOrders ? JSON.parse(storedOrders) : [];
        }

        function saveOrders() { localStorage.setItem('orders_trend', JSON.stringify(orders)); }

        // ---------- CART ----------
        function updateCartUI() {
            const container = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotalAmount');
            const badge = document.getElementById('cartBadge');
            let total = 0;
            let itemCount = 0;
            if (!cart.length) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><p>السلة فارغة</p></div>`;
                badge.classList.add('hidden');
            } else {
                container.innerHTML = cart.map((item) => {
                    const p = products.find(prod => prod.id === item.id);
                    total += p.price * item.qty;
                    itemCount += item.qty;
                    return `
                        <div class="flex gap-3 bg-gray-50 p-3 rounded-xl border">
                            <div class="w-16 h-16 rounded-lg bg-cover bg-center" style="background-image: url('${p.image}')"></div>
                            <div class="flex-1">
                                <h4 class="font-bold">${p.name}</h4>
                                <p class="text-sm font-bold text-gray-600">${p.price.toLocaleString()} ج.س</p>
                                <div class="flex justify-between items-center mt-2">
                                    <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border">
                                        <button onclick="updateCartQty(${p.id}, -1)">-</button>
                                        <span class="text-sm font-bold">${item.qty}</span>
                                        <button onclick="updateCartQty(${p.id}, 1)">+</button>
                                    </div>
                                    <button onclick="removeFromCart(${p.id})" class="text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        </div>`;
                }).join('');
                badge.innerText = itemCount;
                badge.classList.remove('hidden');
            }
            totalSpan.innerText = total.toLocaleString() + ' ج.س';
        }

        function addToCart(productId) {
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.qty++;
            else cart.push({ id: productId, qty: 1 });
            updateCartUI();
            showToast('تمت الإضافة للسلة');
            toggleCart(true);
        }

        function updateCartQty(id, delta) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx !== -1) {
                cart[idx].qty += delta;
                if (cart[idx].qty <= 0) cart.splice(idx, 1);
                updateCartUI();
            }
        }
        function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }

        // ---------- WHATSAPP CHECKOUT ----------
        function checkout() {
            if (!currentUser) return;
            if (cart.length === 0) return showToast('السلة فارغة', true);
            
            let total = 0;
            let itemsText = "";
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.id);
                total += p.price * item.qty;
                itemsText += `- ${p.name} (عدد ${item.qty}) = ${p.price * item.qty} ج.س\n`;
            });

            // إنشاء رسالة الواتساب
            const message = `🛍️ *طلب جديد من متجر ترند الأناقة*\n\n` +
                            `👤 *اسم العميل:* ${currentUser.username}\n` +
                            `📦 *الطلبات:*\n${itemsText}\n` +
                            `💰 *الإجمالي:* ${total.toLocaleString()} ج.س\n\n` +
                            `يرجى تأكيد الطلب وتجهيزه.`;

            const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            
            // تسجيل محلي للطلب
            orders.push({ user: currentUser.username, date: new Date().toLocaleString(), total, items: [...cart] });
            saveOrders();

            // فتح واتساب
            window.open(waUrl, '_blank');
            
            // تفريغ السلة
            cart = [];
            updateCartUI();
            toggleCart(false);
        }

        function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="mb-8 text-center py-6 bg-black text-white rounded-3xl">
                    <h2 class="text-3xl font-black">ترند الأناقة 2026</h2>
                    <p class="text-gray-400 mt-2">عبر عن شخصيتك بأرقى الأزياء</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    ${products.map(p => `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden group border border-gray-100">
                            <div class="h-48 bg-cover bg-center" style="background-image: url('${p.image}')"></div>
                            <div class="p-4">
                                <h3 class="font-bold text-sm">${p.name}</h3>
                                <p class="text-black font-black mt-1">${p.price.toLocaleString()} ج.س</p>
                                <button onclick="addToCart(${p.id})" class="mt-3 w-full border-2 border-black py-2 rounded-xl text-xs font-bold hover:bg-black hover:text-white transition">أضف للحقيبة</button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        }
        
        

        function navigate(page) {
            if (page === 'home') renderHome();
        }

        function toggleCart(open = null) {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            if (open === true) { sidebar.classList.add('open'); overlay.classList.add('show'); }
            else if (open === false) { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
            else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            if (username) {
                currentUser = { username };
                document.getElementById('loginModal').style.display = 'none';
                renderHome();
            }
        }

        function logout() { currentUser = null; document.getElementById('loginModal').style.display = 'flex'; }

        loadData();
        renderHome();
    </script>
</body>
</html>
