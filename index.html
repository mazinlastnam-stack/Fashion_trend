<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لمسة شبابية - أناقتك تميزك</title>
    <!-- Font Awesome 6 (مجاني) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: خط حديث للعربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9f9f9;
            color: #1e1e1e;
            line-height: 1.5;
        }

        /* الألوان الأساسية */
        :root {
            --black: #0a0a0a;
            --black-soft: #111111;
            --gold: #D4AF37;
            --gold-dark: #b88c2e;
            --gold-gradient: linear-gradient(135deg, #D4AF37, #F3E5AB);
            --gray-light: #f4f4f4;
            --white: #ffffff;
        }

        /* شريط التنقل (الهيدر) */
        .navbar {
            background-color: var(--black);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 0.8rem;
            color: var(--gold);
            border-right: 1px solid var(--gold);
            padding-right: 12px;
            margin-right: 6px;
            font-weight: 500;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
        }

        .nav-icons i {
            color: var(--gold);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-icons i:hover {
            color: white;
        }

        /* القسم الرئيسي Hero */
        .hero {
            background: linear-gradient(97deg, #0a0a0a 30%, #1a1a1a 100%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--gold);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--white);
        }

        .hero h1 span {
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            color: #ccc;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .hero-icon {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .hero-icon i {
            font-size: 2rem;
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            padding: 0.7rem;
            border-radius: 50%;
        }

        /* المنتجات */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 0;
            width: 60px;
            height: 3px;
            background: var(--gold);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #eee;
            transition: 0.3s;
        }

        .product-info {
            padding: 1.2rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .product-price {
            color: var(--gold-dark);
            font-weight: 800;
            font-size: 1.3rem;
            margin: 0.5rem 0;
        }

        .btn-gold {
            background: var(--gold);
            border: none;
            color: var(--black);
            padding: 0.7rem 1rem;
            width: 100%;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gold:hover {
            background: var(--gold-dark);
            color: white;
            transform: scale(0.98);
        }

        /* أيقونات مميزة */
        .badge-star {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #faf3e0;
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: var(--gold-dark);
        }

        /* تذييل */
        footer {
            background-color: var(--black);
            color: #aaa;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid var(--gold);
        }

        footer .footer-logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* استجابة */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .container {
                padding: 1rem;
            }
            .products-grid {
                gap: 1.2rem;
            }
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }
        .logo-icon i {
            font-size: 1.3rem;
            color: var(--gold);
        }

        /* مودال الطلب */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--gold);
            color: white;
        }
        .modal-content h3 {
            margin-bottom: 1rem;
            color: var(--gold);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            color: white;
        }
        .modal-content .btn-gold {
            margin-top: 1rem;
        }
        .close-modal {
            float: left;
            font-size: 24px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--gold);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
            z-index: 3000;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-hanger"></i>
            </div>
            <div class="logo">لَمْسَة شَبَابِيَّة</div>
            <div class="tagline">أناقتك... تميزك</div>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-user"></i>
            <i class="fas fa-shopping-bag" id="cartIcon"></i>
        </div>
    </div>

    <div class="hero">
        <h1>أطلَق <span>أناقتَك</span> <br> مع لمسة شبابية</h1>
        <p>أزياء راقية تعكس تميزك، تشكيلة حصرية لكل الأذواق</p>
    </div>

    <div class="container">
        <h2 class="section-title">أحدث الإطلالات</h2>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <footer>
        <div class="footer-logo">لَمْسَة شَبَابِيَّة</div>
        <p>© 2025 جميع الحقوق محفوظة | أناقتك سر تميزك</p>
        <div>
            <i class="fab fa-instagram" style="color: var(--gold); margin: 0 6px;"></i>
            <i class="fab fa-twitter" style="color: var(--gold); margin: 0 6px;"></i>
            <i class="fab fa-snapchat" style="color: var(--gold); margin: 0 6px;"></i>
        </div>
    </footer>

    <!-- مودال إدخال بيانات العميل -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>إتمام الطلب</h3>
            <input type="text" id="customerName" placeholder="الاسم الكامل" required>
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
            <textarea id="customerAddress" rows="3" placeholder="العنوان بالتفصيل"></textarea>
            <button class="btn-gold" id="confirmOrderBtn">تأكيد الطلب</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // === ربط localStorage مع admin ===
        let products = JSON.parse(localStorage.getItem('lamsa_products')) || [
            { id: 1, name: 'بليزر كلاسيك ذهبي', price: 340, oldPrice: 0, category: 'men', desc: 'بليزر بقصة عصرية', icon: 'fas fa-tshirt', badge: 'إصدار محدود', image: 'https://placehold.co/600x800/111111/D4AF37?text=Blazer' },
            { id: 2, name: 'قميص كاجوال أسود', price: 180, oldPrice: 250, category: 'men', desc: 'قميص قطني مريح', icon: 'fas fa-tshirt', badge: 'الأكثر مبيعاً', image: 'https://placehold.co/600x800/111111/D4AF37?text=Shirt' },
            { id: 3, name: 'ساعة أنيقة ذهبية', price: 550, oldPrice: 0, category: 'watches', desc: 'ساعة كرونوغراف', icon: 'fas fa-clock', badge: 'تميز', image: 'https://placehold.co/600x800/111111/D4AF37?text=Watch' },
            { id: 4, name: 'حذاء جلد فاخر', price: 420, oldPrice: 600, category: 'shoes', desc: 'حذاء رسمي', icon: 'fas fa-shoe-prints', badge: 'جودة عالية', image: 'https://placehold.co/600x800/111111/D4AF37?text=Shoes' },
            { id: 5, name: 'حقيبة يد أنيقة', price: 290, oldPrice: 0, category: 'women', desc: 'حقيبة جلدية', icon: 'fas fa-bag-shopping', badge: '', image: 'https://placehold.co/600x800/111111/D4AF37?text=Bag' }
        ];
        let orders = JSON.parse(localStorage.getItem('lamsa_orders')) || [];

        // حفظ المنتجات إذا لم تكن موجودة (لضمان التوافق)
        if (!localStorage.getItem('lamsa_products')) {
            localStorage.setItem('lamsa_products', JSON.stringify(products));
        }

        let selectedProduct = null;

        // عرض المنتجات
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${product.image || 'https://placehold.co/600x800/111111/D4AF37?text=No+Img'}" alt="${product.name}">
                    <div class="product-info">
                        ${product.badge ? `<div class="badge-star"><i class="fas fa-star"></i> ${product.badge}</div>` : ''}
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price} ر.س ${product.oldPrice ? `<del>${product.oldPrice} ر.س</del>` : ''}</div>
                        <button class="btn-gold" data-id="${product.id}" data-name="${product.name}">
                            <i class="fas fa-shopping-cart"></i> أضف إلى السلة
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // إضافة حدث لكل زر
            document.querySelectorAll('.btn-gold').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const productId = parseInt(btn.getAttribute('data-id'));
                    selectedProduct = products.find(p => p.id === productId);
                    if (selectedProduct) {
                        openModal();
                    } else {
                        showToast('حدث خطأ، حاول مرة أخرى', 'error');
                    }
                });
            });
        }

        // مودال الطلب
        function openModal() {
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerAddress').value = '';
            selectedProduct = null;
        }

        // حفظ الطلب
        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            if (!name || !phone) {
                showToast('الرجاء إدخال الاسم ورقم الهاتف', 'error');
                return;
            }
            if (!selectedProduct) return;

            const newOrder = {
                name: name,
                phone: phone,
                address: address,
                total: selectedProduct.price,
                productName: selectedProduct.name,
                productId: selectedProduct.id,
                date: new Date().toISOString()
            };
            orders.push(newOrder);
            localStorage.setItem('lamsa_orders', JSON.stringify(orders));
            showToast(`تم إضافة طلبك بنجاح: ${selectedProduct.name}`, 'success');
            closeModal();

            // (اختياري) يمكن إرسال إشعار تليجرام هنا إذا رغبت
        }

        // رسالة توست
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = type === 'success' ? 'var(--gold)' : '#f44336';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // حدث تأكيد الطلب
        document.getElementById('confirmOrderBtn').addEventListener('click', submitOrder);

        // إغلاق المودال بالضغط خارج المحتوى
        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // أيقونة السلة (يمكن توجيهها لصفحة السلة لاحقاً)
        document.getElementById('cartIcon').addEventListener('click', () => {
            showToast('سيتم تفعيل سلة التسوق قريباً', 'info');
        });

        // تهيئة الصفحة
        renderProducts();
    </script>
</body>
</html>
